name: API Test Automation

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Start API server in background
        run: npm start &

      - name: Wait for API healthcheck
        run: |
          for i in {1..20}; do
            if curl --silent --fail http://localhost:3000/api/healthcheck | grep -q '"status":"ok"'; then
              echo 'API is healthy';
              exit 0;
            fi;
            echo 'Waiting for API...';
            sleep 2;
          done;
          echo 'API did not become healthy in time';
          exit 1

      - name: Run API tests
        run: npm test
